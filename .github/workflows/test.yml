name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Unit tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: requirements.txt

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install ruff==0.15.15

    - name: Lint with ruff
      run: ruff check .

    - name: Check formatting with ruff
      run: ruff format --check .

    - name: Run unit tests
      run: python -m unittest discover tests -v

    - name: Validate Windows launcher PowerShell
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $c = Get-Content -LiteralPath 'EDOPro-HD-Sync.bat' -Raw
        $marker = '#PS' + 'START#'
        $idx = $c.IndexOf($marker)
        if ($idx -lt 0) { throw 'PowerShell marker not found in launcher' }
        $ps = $c.Substring($idx)
        $errors = $null
        [void][System.Management.Automation.Language.Parser]::ParseInput($ps, [ref]$null, [ref]$errors)
        if ($errors.Count -gt 0) {
          $errors | ForEach-Object { Write-Host $_.Message }
          throw 'Launcher PowerShell has syntax errors'
        }
        Write-Host 'Windows launcher PowerShell parses cleanly.'
