name: Build and Release

permissions:
  contents: write
  id-token: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: macos-latest
          - os: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Determine release version
      id: release_version
      shell: bash
      run: |
        version="${GITHUB_REF_NAME#v}"
        if [ "${GITHUB_REF_TYPE}" != "tag" ] || [ -z "${version}" ] || [ "${version}" = "${GITHUB_REF_NAME}" ]; then
          version="dev"
        fi
        echo "value=${version}" >> "$GITHUB_OUTPUT"
        printf '%s\n' "${version}" > VERSION

    - name: Install Dependencies
      shell: bash
      run: |
        pip install -r requirements.txt
        pip install pyinstaller pillow

    - name: Generate release icon
      shell: bash
      run: python tools/build_icon.py

    - name: Build with PyInstaller
      shell: bash
      run: |
        pyinstaller --onefile --name EDOPro-HD-Sync --icon build/app-icon.ico --collect-data certifi --add-data "VERSION${{ matrix.os == 'windows-latest' && ';' || ':' }}." main.py

    - name: Smoke test packaged binary
      shell: bash
      run: |
        binary="dist/EDOPro-HD-Sync"
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          binary="${binary}.exe"
        fi
        "$binary" --health-check --quiet

    - name: Check Windows signing configuration
      if: matrix.os == 'windows-latest'
      id: windows_signing
      shell: pwsh
      env:
        AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        TRUSTED_SIGNING_ACCOUNT_NAME: ${{ vars.TRUSTED_SIGNING_ACCOUNT_NAME }}
        TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ vars.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
        TRUSTED_SIGNING_ENDPOINT: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
      run: |
        $required = @{
          "AZURE_CLIENT_ID" = $env:AZURE_CLIENT_ID
          "AZURE_CLIENT_SECRET" = $env:AZURE_CLIENT_SECRET
          "AZURE_TENANT_ID" = $env:AZURE_TENANT_ID
          "TRUSTED_SIGNING_ACCOUNT_NAME" = $env:TRUSTED_SIGNING_ACCOUNT_NAME
          "TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME" = $env:TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME
          "TRUSTED_SIGNING_ENDPOINT" = $env:TRUSTED_SIGNING_ENDPOINT
        }

        $missing = @(
          $required.GetEnumerator() |
          Where-Object { [string]::IsNullOrWhiteSpace($_.Value) } |
          ForEach-Object { $_.Key } |
          Sort-Object
        )

        if ($missing.Count -gt 0) {
          "enabled=false" >> $env:GITHUB_OUTPUT
          Write-Warning "Windows signing is not configured. Missing: $($missing -join ', ')"
        } else {
          "enabled=true" >> $env:GITHUB_OUTPUT
        }

    - name: Warn when Windows release is unsigned
      if: matrix.os == 'windows-latest' && steps.windows_signing.outputs.enabled != 'true'
      shell: bash
      run: |
        echo "::warning::Windows signing is not configured. Smart App Control may block this executable."
        echo "::warning::Set repo secrets AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID and repo variables TRUSTED_SIGNING_ACCOUNT_NAME, TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME, TRUSTED_SIGNING_ENDPOINT."

    - name: Sign Windows executable
      if: matrix.os == 'windows-latest' && steps.windows_signing.outputs.enabled == 'true'
      uses: azure/trusted-signing-action@v0.5.10
      with:
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
        signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT_NAME }}
        certificate-profile-name: ${{ vars.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
        files-folder: ${{ github.workspace }}\dist
        files-folder-filter: exe
        file-digest: SHA256
        timestamp-rfc3161: http://timestamp.acs.microsoft.com
        timestamp-digest: SHA256

    - name: Package (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $version = "${{ steps.release_version.outputs.value }}"
        $bundleDir = "dist/EDOPro HD Sync Windows"
        $archive = "dist/EDOPro-HD-Sync-Windows-v$version.zip"
        if (Test-Path $bundleDir) {
          Remove-Item $bundleDir -Recurse -Force
        }
        if (Test-Path $archive) {
          Remove-Item $archive -Force
        }
        New-Item -ItemType Directory -Path $bundleDir | Out-Null
        Copy-Item "dist/EDOPro-HD-Sync.exe" -Destination "$bundleDir/EDOPro-HD-Sync.exe"
        Copy-Item "release_assets/ReadMe-Windows.txt" -Destination "$bundleDir/ReadMe.txt"
        Compress-Archive -Path $bundleDir -DestinationPath $archive -Force

    - name: Package (macOS)
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        version="${{ steps.release_version.outputs.value }}"
        archive="EDOPro-HD-Sync-macOS-v${version}.zip"
        mv dist/EDOPro-HD-Sync dist/EDOPro-HD-Sync-macOS
        chmod +x dist/EDOPro-HD-Sync-macOS
        chmod +x EDOPro-HD-Sync.command
        mkdir -p "dist/EDOPro HD Sync MacOS"
        mv dist/EDOPro-HD-Sync-macOS "dist/EDOPro HD Sync MacOS/"
        cp EDOPro-HD-Sync.command "dist/EDOPro HD Sync MacOS/"
        cp release_assets/ReadMe-MacOS.txt "dist/EDOPro HD Sync MacOS/ReadMe.txt"
        cd dist && zip -r "$archive" "EDOPro HD Sync MacOS"

    - name: Package (Linux)
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        version="${{ steps.release_version.outputs.value }}"
        archive="EDOPro-HD-Sync-Linux-v${version}.zip"
        wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
        chmod +x appimagetool

        mkdir -p AppDir/usr/bin
        cp dist/EDOPro-HD-Sync AppDir/usr/bin/
        chmod +x AppDir/usr/bin/EDOPro-HD-Sync

        cat > AppDir/AppRun << 'APPRUN'
        #!/bin/bash
        SELF=$(readlink -f "$0")
        HERE="${SELF%/*}"
        exec "$HERE/usr/bin/EDOPro-HD-Sync" "$@"
        APPRUN
        chmod +x AppDir/AppRun

        cat > AppDir/EDOPro-HD-Sync.desktop << 'DESKTOP'
        [Desktop Entry]
        Name=EDOPro HD Sync
        Exec=EDOPro-HD-Sync
        Icon=EDOPro-HD-Sync
        Type=Application
        Categories=Utility;
        Terminal=true
        DESKTOP

        cp build/app-icon.png AppDir/EDOPro-HD-Sync.png

        APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 ./appimagetool AppDir dist/EDOPro-HD-Sync-Linux.AppImage
        mkdir -p "dist/EDOPro HD Sync Linux"
        mv dist/EDOPro-HD-Sync-Linux.AppImage "dist/EDOPro HD Sync Linux/"
        cp release_assets/ReadMe-Linux.txt "dist/EDOPro HD Sync Linux/ReadMe.txt"
        cd dist && zip -r "$archive" "EDOPro HD Sync Linux"

    - name: Determine release file
      id: release_file
      shell: bash
      run: |
        version="${{ steps.release_version.outputs.value }}"
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          echo "path=dist/EDOPro-HD-Sync-Windows-v${version}.zip" >> "$GITHUB_OUTPUT"
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          echo "path=dist/EDOPro-HD-Sync-macOS-v${version}.zip" >> "$GITHUB_OUTPUT"
        else
          echo "path=dist/EDOPro-HD-Sync-Linux-v${version}.zip" >> "$GITHUB_OUTPUT"
        fi

    - name: Compute SHA256 checksum
      id: checksum
      shell: bash
      run: |
        archive="${{ steps.release_file.outputs.path }}"
        checksum_path="${archive}.sha256"
        if [ "${{ matrix.os }}" = "macos-latest" ]; then
          (cd "$(dirname "$archive")" && shasum -a 256 "$(basename "$archive")") > "$checksum_path"
        else
          (cd "$(dirname "$archive")" && sha256sum "$(basename "$archive")") > "$checksum_path"
        fi
        echo "path=${checksum_path}" >> "$GITHUB_OUTPUT"
        cat "$checksum_path"

    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        name: EDOPro HD Sync v${{ steps.release_version.outputs.value }}
        fail_on_unmatched_files: true
        files: |
          ${{ steps.release_file.outputs.path }}
          ${{ steps.checksum.outputs.path }}
