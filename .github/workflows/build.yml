name: Build and Release

permissions:
  contents: write
  id-token: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            release_path: dist/EDOPro-HD-Sync-Windows.exe
          - os: macos-latest
            release_path: dist/EDOPro-HD-Sync-macOS.zip
          - os: ubuntu-latest
            release_path: dist/EDOPro-HD-Sync-Linux.AppImage

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      shell: bash
      run: |
        pip install -r requirements.txt
        pip install pyinstaller pillow

    - name: Generate release icon
      shell: bash
      run: python tools/build_icon.py

    - name: Build with PyInstaller
      shell: bash
      run: |
        pyinstaller --onefile --name EDOPro-HD-Sync --icon build/app-icon.ico --collect-data certifi main.py

    - name: Package (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: mv dist/EDOPro-HD-Sync.exe dist/EDOPro-HD-Sync-Windows.exe

    - name: Check Windows signing configuration
      if: matrix.os == 'windows-latest'
      id: windows_signing
      shell: pwsh
      env:
        AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        TRUSTED_SIGNING_ACCOUNT_NAME: ${{ vars.TRUSTED_SIGNING_ACCOUNT_NAME }}
        TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ vars.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
        TRUSTED_SIGNING_ENDPOINT: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
      run: |
        $required = @{
          "AZURE_CLIENT_ID" = $env:AZURE_CLIENT_ID
          "AZURE_CLIENT_SECRET" = $env:AZURE_CLIENT_SECRET
          "AZURE_TENANT_ID" = $env:AZURE_TENANT_ID
          "TRUSTED_SIGNING_ACCOUNT_NAME" = $env:TRUSTED_SIGNING_ACCOUNT_NAME
          "TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME" = $env:TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME
          "TRUSTED_SIGNING_ENDPOINT" = $env:TRUSTED_SIGNING_ENDPOINT
        }

        $missing = @(
          $required.GetEnumerator() |
          Where-Object { [string]::IsNullOrWhiteSpace($_.Value) } |
          ForEach-Object { $_.Key } |
          Sort-Object
        )

        if ($missing.Count -gt 0) {
          "enabled=false" >> $env:GITHUB_OUTPUT
          Write-Warning "Windows signing is not configured. Missing: $($missing -join ', ')"
        } else {
          "enabled=true" >> $env:GITHUB_OUTPUT
        }

    - name: Warn when Windows release is unsigned
      if: matrix.os == 'windows-latest' && steps.windows_signing.outputs.enabled != 'true'
      shell: bash
      run: |
        echo "::warning::Windows signing is not configured. Smart App Control may block this executable."
        echo "::warning::Set repo secrets AZURE_CLIENT_ID, AZURE_CLIENT_SECRET, AZURE_TENANT_ID and repo variables TRUSTED_SIGNING_ACCOUNT_NAME, TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME, TRUSTED_SIGNING_ENDPOINT."

    - name: Sign Windows executable
      if: matrix.os == 'windows-latest' && steps.windows_signing.outputs.enabled == 'true'
      uses: azure/trusted-signing-action@v0.5.10
      with:
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        endpoint: ${{ vars.TRUSTED_SIGNING_ENDPOINT }}
        signing-account-name: ${{ vars.TRUSTED_SIGNING_ACCOUNT_NAME }}
        certificate-profile-name: ${{ vars.TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
        files-folder: ${{ github.workspace }}\dist
        files-folder-filter: exe
        file-digest: SHA256
        timestamp-rfc3161: http://timestamp.acs.microsoft.com
        timestamp-digest: SHA256

    - name: Package (macOS)
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        mv dist/EDOPro-HD-Sync dist/EDOPro-HD-Sync-macOS
        chmod +x dist/EDOPro-HD-Sync-macOS
        chmod +x EDOPro-HD-Sync.command
        zip -j dist/EDOPro-HD-Sync-macOS.zip dist/EDOPro-HD-Sync-macOS EDOPro-HD-Sync.command

    - name: Package (Linux)
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
        chmod +x appimagetool

        mkdir -p AppDir/usr/bin
        cp dist/EDOPro-HD-Sync AppDir/usr/bin/
        chmod +x AppDir/usr/bin/EDOPro-HD-Sync

        cat > AppDir/AppRun << 'APPRUN'
        #!/bin/bash
        SELF=$(readlink -f "$0")
        HERE="${SELF%/*}"
        exec "$HERE/usr/bin/EDOPro-HD-Sync" "$@"
        APPRUN
        chmod +x AppDir/AppRun

        cat > AppDir/EDOPro-HD-Sync.desktop << 'DESKTOP'
        [Desktop Entry]
        Name=EDOPro HD Sync
        Exec=EDOPro-HD-Sync
        Icon=EDOPro-HD-Sync
        Type=Application
        Categories=Utility;
        Terminal=true
        DESKTOP

        cp build/app-icon.png AppDir/EDOPro-HD-Sync.png

        APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 ./appimagetool AppDir dist/EDOPro-HD-Sync-Linux.AppImage

    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ${{ matrix.release_path }}
