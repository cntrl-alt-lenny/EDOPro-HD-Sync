name: Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # keep building other platforms if one fails
      matrix:
        include:
          - os: windows-latest
            release_path: dist/EDOPro-HD-Sync-Windows.exe
          - os: macos-latest
            release_path: dist/EDOPro-HD-Sync-macOS.zip
          - os: ubuntu-latest
            release_path: dist/EDOPro-HD-Sync-Linux.AppImage

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      shell: bash
      run: |
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      shell: bash
      run: |
        pyinstaller --onefile --name EDOPro-HD-Sync --collect-data certifi main.py

    # ── Windows: rename to .exe ───────────────────────────────────────────────
    - name: Package (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: mv dist/EDOPro-HD-Sync.exe dist/EDOPro-HD-Sync-Windows.exe

    # ── macOS: zip binary + launcher together (zip preserves execute bit) ─────
    - name: Package (macOS)
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        mv dist/EDOPro-HD-Sync dist/EDOPro-HD-Sync-macOS
        chmod +x dist/EDOPro-HD-Sync-macOS
        chmod +x EDOPro-HD-Sync.command
        # -j flattens paths so both files sit at the root of the zip
        # zip on macOS preserves Unix permissions, so the execute bit on
        # .command survives the download → unzip journey
        zip -j dist/EDOPro-HD-Sync-macOS.zip dist/EDOPro-HD-Sync-macOS EDOPro-HD-Sync.command

    # ── Linux: AppImage (single double-clickable file) ────────────────────────
    - name: Package (Linux)
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
        chmod +x appimagetool

        mkdir -p AppDir/usr/bin
        cp dist/EDOPro-HD-Sync AppDir/usr/bin/
        chmod +x AppDir/usr/bin/EDOPro-HD-Sync

        cat > AppDir/AppRun << 'APPRUN'
        #!/bin/bash
        SELF=$(readlink -f "$0")
        HERE="${SELF%/*}"
        exec "$HERE/usr/bin/EDOPro-HD-Sync" "$@"
        APPRUN
        chmod +x AppDir/AppRun

        cat > AppDir/EDOPro-HD-Sync.desktop << 'DESKTOP'
        [Desktop Entry]
        Name=EDOPro HD Sync
        Exec=EDOPro-HD-Sync
        Icon=EDOPro-HD-Sync
        Type=Application
        Categories=Utility;
        Terminal=true
        DESKTOP

        python3 -c "
        import struct, zlib
        def chunk(tag, data):
            c = tag + data
            return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
        w = h = 256
        raw = b''.join(b'\x00' + bytes([0, 102, 204] * w) for _ in range(h))
        png = b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)) + chunk(b'IDAT', zlib.compress(raw)) + chunk(b'IEND', b'')
        open('AppDir/EDOPro-HD-Sync.png', 'wb').write(png)
        "

        APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 ./appimagetool AppDir dist/EDOPro-HD-Sync-Linux.AppImage

    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ${{ matrix.release_path }}
