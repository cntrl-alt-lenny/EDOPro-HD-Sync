name: Build and Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            release_path: dist/EDOPro-HD-Sync-Windows.exe
          - os: macos-latest
            release_path: dist/EDOPro-HD-Sync-macOS.zip
          - os: ubuntu-latest
            release_path: dist/EDOPro-HD-Sync-Linux.AppImage

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      shell: bash
      run: |
        pip install -r requirements.txt
        pip install pyinstaller pillow

    - name: Generate release icon
      shell: bash
      run: python tools/build_icon.py

    - name: Build with PyInstaller
      shell: bash
      run: |
        pyinstaller --onefile --name EDOPro-HD-Sync --icon build/app-icon.ico --collect-data certifi main.py

    - name: Package (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: mv dist/EDOPro-HD-Sync.exe dist/EDOPro-HD-Sync-Windows.exe

    - name: Package (macOS)
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        mv dist/EDOPro-HD-Sync dist/EDOPro-HD-Sync-macOS
        chmod +x dist/EDOPro-HD-Sync-macOS
        chmod +x EDOPro-HD-Sync.command
        zip -j dist/EDOPro-HD-Sync-macOS.zip dist/EDOPro-HD-Sync-macOS EDOPro-HD-Sync.command

    - name: Package (Linux)
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
        chmod +x appimagetool

        mkdir -p AppDir/usr/bin
        cp dist/EDOPro-HD-Sync AppDir/usr/bin/
        chmod +x AppDir/usr/bin/EDOPro-HD-Sync

        cat > AppDir/AppRun << 'APPRUN'
        #!/bin/bash
        SELF=$(readlink -f "$0")
        HERE="${SELF%/*}"
        exec "$HERE/usr/bin/EDOPro-HD-Sync" "$@"
        APPRUN
        chmod +x AppDir/AppRun

        cat > AppDir/EDOPro-HD-Sync.desktop << 'DESKTOP'
        [Desktop Entry]
        Name=EDOPro HD Sync
        Exec=EDOPro-HD-Sync
        Icon=EDOPro-HD-Sync
        Type=Application
        Categories=Utility;
        Terminal=true
        DESKTOP

        cp build/app-icon.png AppDir/EDOPro-HD-Sync.png

        APPIMAGE_EXTRACT_AND_RUN=1 ARCH=x86_64 ./appimagetool AppDir dist/EDOPro-HD-Sync-Linux.AppImage

    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ${{ matrix.release_path }}
