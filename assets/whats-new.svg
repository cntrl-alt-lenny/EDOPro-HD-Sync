<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 295" width="760" height="295" role="img" aria-label="What's new in EDOPro HD Sync v4.12.0">
  <style>
    text { font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 2.5px; fill: #7f89a6; }
    .title { font-size: 26px; font-weight: 700; fill: #f3f6ff; }
    .title-version { fill: #ffd76a; }
    .date { font-size: 12.5px; fill: #7f89a6; }
    .foot { font-size: 12px; fill: #6d7690; }
    /* Slide-in only — never animate opacity here. A static renderer (README
       thumbnailers, some mobile apps) shows frame zero, so content must be
       fully visible in that frame. */
    .item { animation: rise 0.5s ease-out backwards; }
    @keyframes rise {
      from { transform: translateY(9px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .item { animation: none; }
    }
    .bullet { font-size: 15px; fill: #d7deee; }
    .stats { font-size: 12.5px; fill: #8b94ad; }
    .spark { animation: pulse 2.6s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .spark2 { animation-delay: 1.3s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.25; transform: scale(0.8); }
      50%      { opacity: 1; transform: scale(1.1); }
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101830"/>
      <stop offset="1" stop-color="#0b1122"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd76a"/>
      <stop offset="1" stop-color="#f0a832"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.15" cy="0" r="1">
      <stop offset="0" stop-color="#ffd76a" stop-opacity="0.14"/>
      <stop offset="0.55" stop-color="#ffd76a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="1" y="1" width="758" height="293" rx="16" fill="url(#bg)" stroke="#2a3554"/>
  <rect x="1" y="1" width="758" height="293" rx="16" fill="url(#glow)"/>

  <text x="30" y="36" class="eyebrow">EDOPRO HD SYNC · LATEST RELEASE</text>
  <text x="30" y="68" class="title">What’s New in <tspan class="title-version">v4.12.0</tspan></text>
  <rect x="30" y="82" width="122" height="3" rx="1.5" fill="url(#gold)"/>
  <text x="30" y="105" class="stats">5 commits · 11 files changed · +744 / −199 lines</text>

  <path class="spark" d="M 611 23 l 3.2 7.8 7.8 3.2 -7.8 3.2 -3.2 7.8 -3.2 -7.8 -7.8 -3.2 7.8 -3.2 Z" fill="url(#gold)"/>
  <path class="spark spark2" d="M 583 37 l 2.1 5 5 2 -5 2 -2.1 5 -2.1 -5 -5 -2 5 -2 Z" fill="url(#gold)"/>

  <rect x="645" y="24" width="87" height="27" rx="13.5" fill="none" stroke="url(#gold)"/>
  <text x="688.5" y="42.5" text-anchor="middle" style="font-size:14px;font-weight:700" fill="#ffd76a">v4.12.0</text>
  <text x="732" y="68" class="date" text-anchor="end">Released July 3, 2026</text>

  <g class="item" style="animation-delay:150ms">
    <rect x="30" y="120" width="42" height="17" rx="8.5" fill="none" stroke="#8b94ad"/>
    <text x="51" y="132" text-anchor="middle" style="font-size:9px;font-weight:700;letter-spacing:0.8px" fill="#8b94ad">MISC</text>
    <text x="86" y="133" class="bullet">Update docs for the new artwork sources</text>
  </g>
  <g class="item" style="animation-delay:260ms">
    <rect x="30" y="153" width="42" height="17" rx="8.5" fill="none" stroke="#8b94ad"/>
    <text x="51" y="165" text-anchor="middle" style="font-size:9px;font-weight:700;letter-spacing:0.8px" fill="#8b94ad">MISC</text>
    <text x="86" y="166" class="bullet">Show what each release added instead of lines changed</text>
  </g>
  <g class="item" style="animation-delay:370ms">
    <rect x="30" y="186" width="42" height="17" rx="8.5" fill="none" stroke="#ffd76a"/>
    <text x="51" y="198" text-anchor="middle" style="font-size:9px;font-weight:700;letter-spacing:0.8px" fill="#ffd76a">NEW</text>
    <text x="86" y="199" class="bullet">Add Field Spell playmat art, Rush Duel &amp; anime cards, and --stats</text>
  </g>

  <line x1="30" y1="253" x2="730" y2="253" stroke="#232d4a"/>
  <text x="30" y="269" class="foot">This panel updates automatically with every release</text>
  <text x="732" y="269" class="foot" text-anchor="end">See all releases →</text>
</svg>
