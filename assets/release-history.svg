<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 760" width="760" height="760" role="img" aria-label="EDOPro HD Sync release history: what each release added">
  <style>
    text { font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 2.5px; fill: #7f89a6; }
    .title { font-size: 26px; font-weight: 700; fill: #f3f6ff; }
    .title-version { fill: #ffd76a; }
    .date { font-size: 12.5px; fill: #7f89a6; }
    .foot { font-size: 12px; fill: #6d7690; }
    /* Slide-in only — never animate opacity here. A static renderer (README
       thumbnailers, some mobile apps) shows frame zero, so content must be
       fully visible in that frame. */
    .item { animation: rise 0.5s ease-out backwards; }
    @keyframes rise {
      from { transform: translateY(9px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .item { animation: none; }
    }
    .entry { font-size: 13.5px; fill: #d7deee; }
    .more { font-size: 12px; fill: #6d7690; font-style: italic; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101830"/>
      <stop offset="1" stop-color="#0b1122"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd76a"/>
      <stop offset="1" stop-color="#f0a832"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.15" cy="0" r="1">
      <stop offset="0" stop-color="#ffd76a" stop-opacity="0.14"/>
      <stop offset="0.55" stop-color="#ffd76a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="1" y="1" width="758" height="758" rx="16" fill="url(#bg)" stroke="#2a3554"/>
  <rect x="1" y="1" width="758" height="758" rx="16" fill="url(#glow)"/>

  <text x="30" y="34" class="eyebrow">RELEASE HISTORY</text>
  <text x="30" y="56" style="font-size:17px;font-weight:700" fill="#f3f6ff">What each release added</text>
  <text x="732" y="56" class="date" text-anchor="end">last 8 releases</text>

  <line x1="40" y1="84" x2="40" y2="664" stroke="#2a3554" stroke-width="2"/>
  <g class="item" style="animation-delay:100ms">
    <circle cx="40" cy="84" r="5" fill="url(#gold)"/>
    <text x="58" y="89"><tspan style="font-size:14.5px;font-weight:700" fill="#ffd76a">v4.11.0</tspan><tspan dx="10" class="date">Jul 3, 2026</tspan></text>
    <text x="732" y="89" class="date" text-anchor="end">2 changes</text>
    <rect x="58" y="96" width="7" height="7" rx="1.5" transform="rotate(45 61.5 99.5)" fill="url(#gold)"/>
    <text x="76" y="104" class="entry">Add a release-activity heatmap and a richer What's New card</text>
    <rect x="58" y="117" width="7" height="7" rx="1.5" transform="rotate(45 61.5 120.5)" fill="url(#gold)"/>
    <text x="76" y="125" class="entry">Add an update check on every launch, even when fully synced</text>
  </g>
  <g class="item" style="animation-delay:190ms">
    <circle cx="40" cy="165" r="5" fill="#101830" stroke="#3a4666" stroke-width="2"/>
    <text x="58" y="170"><tspan style="font-size:14.5px;font-weight:700" fill="#aeb7cf">v4.10.0</tspan><tspan dx="10" class="date">Jul 3, 2026</tspan></text>
    <text x="732" y="170" class="date" text-anchor="end">5 changes</text>
    <rect x="58" y="177" width="7" height="7" rx="1.5" transform="rotate(45 61.5 180.5)" fill="url(#gold)"/>
    <text x="76" y="185" class="entry">Enable Dependabot dependency alerts</text>
    <rect x="58" y="198" width="7" height="7" rx="1.5" transform="rotate(45 61.5 201.5)" fill="url(#gold)"/>
    <text x="76" y="206" class="entry">Add a self-updating What's New panel to the README</text>
    <text x="76" y="225" class="more">+ 3 more changes</text>
  </g>
  <g class="item" style="animation-delay:280ms">
    <circle cx="40" cy="263" r="5" fill="#101830" stroke="#3a4666" stroke-width="2"/>
    <text x="58" y="268"><tspan style="font-size:14.5px;font-weight:700" fill="#aeb7cf">v4.9.0</tspan><tspan dx="10" class="date">Jun 3, 2026</tspan></text>
    <text x="732" y="268" class="date" text-anchor="end">2 changes</text>
    <rect x="58" y="275" width="7" height="7" rx="1.5" transform="rotate(45 61.5 278.5)" fill="url(#gold)"/>
    <text x="76" y="283" class="entry">Add single-file Windows &amp; Linux launchers</text>
    <rect x="58" y="296" width="7" height="7" rx="1.5" transform="rotate(45 61.5 299.5)" fill="url(#gold)"/>
    <text x="76" y="304" class="entry">Support multiple curated texture packs</text>
  </g>
  <g class="item" style="animation-delay:370ms">
    <circle cx="40" cy="344" r="5" fill="#101830" stroke="#3a4666" stroke-width="2"/>
    <text x="58" y="349"><tspan style="font-size:14.5px;font-weight:700" fill="#aeb7cf">v4.8.0</tspan><tspan dx="10" class="date">Jun 3, 2026</tspan></text>
    <text x="732" y="349" class="date" text-anchor="end">2 changes</text>
    <rect x="58" y="356" width="7" height="7" rx="1.5" transform="rotate(45 61.5 359.5)" fill="url(#gold)"/>
    <text x="76" y="364" class="entry">Add --repair to re-download broken images</text>
    <rect x="58" y="377" width="7" height="7" rx="1.5" transform="rotate(45 61.5 380.5)" fill="url(#gold)"/>
    <text x="76" y="385" class="entry">Make repeat runs incremental instead of always re-downloading</text>
  </g>
  <g class="item" style="animation-delay:460ms">
    <circle cx="40" cy="425" r="5" fill="#101830" stroke="#3a4666" stroke-width="2"/>
    <text x="58" y="430"><tspan style="font-size:14.5px;font-weight:700" fill="#aeb7cf">v4.7.0</tspan><tspan dx="10" class="date">Jun 2, 2026</tspan></text>
    <text x="732" y="430" class="date" text-anchor="end">2 changes</text>
    <rect x="58" y="437" width="7" height="7" rx="1.5" transform="rotate(45 61.5 440.5)" fill="url(#gold)"/>
    <text x="76" y="445" class="entry">Add curated texture pack download (all platforms)</text>
    <rect x="58" y="458" width="7" height="7" rx="1.5" transform="rotate(45 61.5 461.5)" fill="url(#gold)"/>
    <text x="76" y="466" class="entry">macOS: single double-clickable launcher with a folder picker</text>
  </g>
  <g class="item" style="animation-delay:550ms">
    <circle cx="40" cy="506" r="5" fill="#101830" stroke="#3a4666" stroke-width="2"/>
    <text x="58" y="511"><tspan style="font-size:14.5px;font-weight:700" fill="#aeb7cf">v4.6.2</tspan><tspan dx="10" class="date">Jun 2, 2026</tspan></text>
    <text x="732" y="511" class="date" text-anchor="end">5 changes</text>
    <rect x="58" y="518" width="7" height="7" rx="1.5" transform="rotate(45 61.5 521.5)" fill="url(#gold)"/>
    <text x="76" y="526" class="entry">Honor HTTP 429 + Retry-After in _try_download()</text>
    <rect x="58" y="539" width="7" height="7" rx="1.5" transform="rotate(45 61.5 542.5)" fill="url(#gold)"/>
    <text x="76" y="547" class="entry">Fix stale Linux README and run startup checks concurrently</text>
    <text x="76" y="566" class="more">+ 3 more changes</text>
  </g>
  <g class="item" style="animation-delay:640ms">
    <circle cx="40" cy="604" r="5" fill="#101830" stroke="#3a4666" stroke-width="2"/>
    <text x="58" y="609"><tspan style="font-size:14.5px;font-weight:700" fill="#aeb7cf">v4.6.1</tspan><tspan dx="10" class="date">Apr 27, 2026</tspan></text>
    <text x="732" y="609" class="date" text-anchor="end">1 change</text>
    <rect x="58" y="616" width="7" height="7" rx="1.5" transform="rotate(45 61.5 619.5)" fill="url(#gold)"/>
    <text x="76" y="624" class="entry">Drop AppImage for Linux, ship raw binary + launcher</text>
  </g>
  <g class="item" style="animation-delay:730ms">
    <circle cx="40" cy="664" r="5" fill="#101830" stroke="#3a4666" stroke-width="2"/>
    <text x="58" y="669"><tspan style="font-size:14.5px;font-weight:700" fill="#aeb7cf">v4.6.0</tspan><tspan dx="10" class="date">Apr 20, 2026</tspan></text>
    <text x="732" y="669" class="date" text-anchor="end">1 change</text>
    <rect x="58" y="676" width="7" height="7" rx="1.5" transform="rotate(45 61.5 679.5)" fill="url(#gold)"/>
    <text x="76" y="684" class="entry">Add failure cache, deck mode, self-update nag, prune, and live progress</text>
  </g>

  <line x1="30" y1="721" x2="730" y2="721" stroke="#232d4a"/>
  <text x="30" y="736" class="foot">This timeline updates automatically with every release</text>
  <text x="732" y="736" class="foot" text-anchor="end">See all releases →</text>
</svg>
